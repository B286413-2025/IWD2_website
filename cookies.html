<!-- Adapted from class code -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  // Dismissal parameters
  const NOTIFICATION_DURATION = 30 * 24 * 60 * 60 * 1000; // 30 days

  // Checking for valid dismissal
  function validDismiss() {
    const cookieConsent = localStorage.getItem('cookieConsent');
    if (!cookieConsent) return false;

    try {
      const consentData = JSON.parse(cookieConsent);

      // Checking if dismissed
      if (!consentData || consentData.status !== 'dismissed') return false;

      // And not expired
      const isExpired = (Date.now() - consentData.timestamp) > NOTIFICATION_DURATION;
      if (isExpired) {
        localStorage.removeItem('cookieConsent');
        return false;
      }

      return true;
    } catch (e) {
      console.error('Error parsing cookie consent:', e);
      localStorage.removeItem('cookieConsent');
      return false;
    }
  }

  // If validly dismissed, not outputting banner
  if (validDismiss()) return;

  // Create cookie consent banner
  const cookieBanner = document.createElement('div');
  cookieBanner.id = 'cookieConsent';
  cookieBanner.className = 'show';

  cookieBanner.innerHTML = `
    <div class="cookie-content">
      <div class="cookie-text">
        This website uses essential cookies to save results and enhance your experience.
        By continuing to visit this site, you acknowledge this notice.
      </div>
      <div class="cookie-buttons">
        <button id="dismissCookies" class="cookie-button" type="button">Dismiss</button>
      </div>
    </div>
  `;

  document.body.appendChild(cookieBanner);

  // Dismiss handler with timestamp
  document.getElementById('dismissCookies').addEventListener('click', function () {
    localStorage.setItem('cookieConsent', JSON.stringify({
      status: 'dismissed',
      timestamp: Date.now()
    }));
    cookieBanner.classList.remove('show');
  });
});
</script>
